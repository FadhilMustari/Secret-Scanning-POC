name: DevSecOps Pipeline

on:
  pull_request:
    branches:
      - main

concurrency:
  group: devsecops-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  devsecops:
    name: DevSecOps Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare reports directory
        if: always()
        shell: bash
        run: mkdir -p reports

      - name: Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SCA
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          format: json
          output: reports/trivy-sca-results.json
          exit-code: '0'

      - name: Set up Docker Buildx
        if: always()
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        if: always()
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: devsecops-poc:${{ github.sha }}

      - name: Image Scan
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: devsecops-poc:${{ github.sha }}
          vuln-type: os,library
          format: json
          output: reports/trivy-image-results.json
          exit-code: '0'

      - name: Trivy Scan Summary
        if: always()
        shell: bash
        run: bash .github/scripts/trivy-summary.sh

      - name: Generate SBOM
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: devsecops-poc:${{ github.sha }}
          format: cyclonedx
          output: reports/sbom.cyclonedx.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: reports/sbom.cyclonedx.json

      - name: SBOM Summary
        if: always()
        shell: bash
        run: bash .github/scripts/sbom-summary.sh

      - name: Start app container for DAST
        if: always()
        shell: bash
        run: |
          docker run -d --name dast-target -p 8080:8080 devsecops-poc:${{ github.sha }}
          echo "Waiting for app to become ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "App is ready."
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time."
          docker logs dast-target || true
          exit 1

      - name: DAST (OWASP ZAP Baseline)
        if: always()
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:8080
          allow_issue_writing: false
          fail_action: false

      - name: Stop app container
        if: always()
        shell: bash
        run: docker rm -f dast-target || true

      - name: Collect ZAP reports
        if: always()
        shell: bash
        run: mv report_html.html report_json.json report_md.md reports/ 2>/dev/null || true

      - name: SonarQube Scan
        if: always()
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995  # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        if: always()
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b  # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}