name: DevSecOps Pipeline

on:
  pull_request:
    branches:
      - main

concurrency:
  group: devsecops-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  devsecops:
    name: DevSecOps Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SCA
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          vuln-type: 'os,library'
          format: 'sarif'
          output: 'trivy-sca-results.sarif'
          exit-code: '0'

      - name: Upload SCA results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sca-results.sarif
          category: trivy-sca

      - name: SCA (JSON report for summary)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          vuln-type: 'os,library'
          format: 'json'
          output: 'trivy-sca-results.json'
          exit-code: '0'

      - name: Set up Docker Buildx
        if: always()
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        if: always()
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: devsecops-poc:${{ github.sha }}

      - name: Image Scan
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'devsecops-poc:${{ github.sha }}'
          vuln-type: 'os,library'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          exit-code: '0'

      - name: Upload Image Scan results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Image Scan (JSON report for summary)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'devsecops-poc:${{ github.sha }}'
          vuln-type: 'os,library'
          format: 'json'
          output: 'trivy-image-results.json'
          exit-code: '0'

      - name: Trivy Scan Summary
        if: always()
        shell: bash
        run: |
          set -uo pipefail

          write_scan_summary() {
            local title="$1"
            local file="$2"
            local max_rows=50
            local total

            {
              echo "### ${title}"
              echo ""

              if [ ! -s "$file" ]; then
                echo "_No report generated._"
                echo ""
                return
              fi

              total=$(jq '[.Results[]?.Vulnerabilities[]?] | length' "$file")

              if [ "$total" -eq 0 ]; then
                echo "No vulnerabilities found ✅"
                echo ""
                return
              fi

              echo "| Severity | Count |"
              echo "|---|---|"
              for sev in CRITICAL HIGH MEDIUM LOW UNKNOWN; do
                count=$(jq --arg sev "$sev" '[.Results[]?.Vulnerabilities[]? | select(.Severity==$sev)] | length' "$file")
                [ "$count" -gt 0 ] && echo "| $sev | $count |"
              done
              echo ""
              echo "**Total: ${total} vulnerabilities**"
              echo ""
              echo "<details><summary>Lihat detail CVE (maks ${max_rows} baris pertama)</summary>"
              echo ""
              echo "| Severity | Package | Installed | Fixed | CVE | Title |"
              echo "|---|---|---|---|---|---|"
              jq -r --argjson max "$max_rows" '
                [.Results[]?.Vulnerabilities[]?]
                | sort_by(.Severity as $s | ({"CRITICAL":0,"HIGH":1,"MEDIUM":2,"LOW":3,"UNKNOWN":4}[$s] // 5))
                | .[0:$max][]
                | "| \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "-") | \(.VulnerabilityID) | \((.Title // "-") | gsub("\\|";"\\\\|") | gsub("\n";" ")) |"
              ' "$file"
              echo ""
              if [ "$total" -gt "$max_rows" ]; then
                echo "_menampilkan ${max_rows} dari ${total} total temuan, daftar lengkap ada di tab **Security → Code scanning**._"
                echo ""
              fi
              echo "</details>"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          }

          {
            echo "## 🔎 Trivy Vulnerability Scan Summary"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          write_scan_summary "📚 SCA (Dependency) Scan" "trivy-sca-results.json"
          write_scan_summary "🖼️ Container Image Scan" "trivy-image-results.json"

      - name: Generate SBOM
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'devsecops-poc:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.cyclonedx.json'

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

      - name: SBOM Summary
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          file="sbom.cyclonedx.json"

          {
            echo "## 📦 SBOM Summary"
            echo ""

            if [ ! -s "$file" ]; then
              echo "_No SBOM generated._"
            else
              total=$(jq '.components | length' "$file")
              echo "**Total components: ${total}**"
              echo ""
              echo "| Ecosystem | Count |"
              echo "|---|---|"
              jq -r '
                [.components[]? | (.purl // "pkg:unknown/") | capture("^pkg:(?<type>[a-zA-Z0-9.+-]+)/").type]
                | group_by(.)
                | map({type: .[0], count: length})
                | sort_by(-.count)
                | .[]
                | "| \(.type) | \(.count) |"
              ' "$file"
              echo ""
              echo "<details><summary>Lihat semua komponen (maks 200 baris)</summary>"
              echo ""
              echo "| Name | Version | Type |"
              echo "|---|---|---|"
              jq -r '
                [.components[]?][0:200][]
                | "| \(.name) | \(.version // "-") | \(.type // "-") |"
              ' "$file"
              echo ""
              if [ "$total" -gt 200 ]; then
                echo "_menampilkan 200 dari ${total} komponen, download artifact **sbom-cyclonedx** untuk daftar lengkap._"
                echo ""
              fi
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: SonarQube Scan
        if: always()
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995  # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        if: always()
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b  # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}