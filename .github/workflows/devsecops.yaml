name: DevSecOps Pipeline

on:
  pull_request:
    branches:
      - main

concurrency:
  group: devsecops-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  devsecops:
    name: DevSecOps Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SCA
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          vuln-type: 'os,library'
          format: 'json'
          output: 'trivy-sca-results.json'
          exit-code: '0'

      - name: Upload SCA results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sca-results
          path: trivy-sca-results.json

      - name: Set up Docker Buildx
        if: always()
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        if: always()
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: devsecops-poc:${{ github.sha }}

      - name: Image Scan
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'devsecops-poc:${{ github.sha }}'
          vuln-type: 'os,library'
          format: 'json'
          output: 'trivy-image-results.json'
          exit-code: '0'

      - name: Upload Image Scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-results
          path: trivy-image-results.json