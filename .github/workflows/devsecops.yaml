name: DevSecOps Pipeline

on:
  pull_request:
    branches:
      - main

concurrency:
  group: devsecops-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  devsecops:
    name: DevSecOps Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SCA
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          vuln-type: 'os,library'
          format: 'json'
          output: 'trivy-sca-results.json'
          exit-code: '0'

      - name: Upload SCA results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sca-results
          path: trivy-sca-results.json

      - name: IaC Scan
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scanners: 'config'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'