name: DevSecOps Pipeline

on:
  pull_request:
    branches:
      - main

concurrency:
  group: devsecops-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  devsecops:
    name: DevSecOps Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SCA
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          format: sarif
          output: trivy-sca-results.sarif
          exit-code: '0'

      - name: SCA — Upload to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sca-results.sarif
          category: trivy-sca

      - name: SCA — JSON
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          format: json
          output: trivy-sca-results.json
          exit-code: '0'

      - name: Set up Docker Buildx
        if: always()
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        if: always()
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: devsecops-poc:${{ github.sha }}

      - name: Image Scan
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: devsecops-poc:${{ github.sha }}
          vuln-type: os,library
          format: sarif
          output: trivy-image-results.sarif
          exit-code: '0'

      - name: Image Scan — Upload to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Image Scan
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: devsecops-poc:${{ github.sha }}
          vuln-type: os,library
          format: json
          output: trivy-image-results.json
          exit-code: '0'

      - name: Trivy Scan Summary
        if: always()
        shell: bash
        run: bash .github/scripts/trivy-summary.sh

      - name: Generate SBOM
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: devsecops-poc:${{ github.sha }}
          format: cyclonedx
          output: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

      - name: SBOM Summary
        if: always()
        shell: bash
        run: bash .github/scripts/sbom-summary.sh

      - name: SonarQube Scan
        if: always()
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995  # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        if: always()
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b  # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}