sonar.projectKey=devsecops-pipeline

# Hanya analisis source code, bukan artefak hasil scanner.
sonar.sources=.

# File JSON/SARIF hasil generate Trivy & SBOM ditulis ke workspace sebelum
# step Sonar jalan. Tanpa exclusion ini SonarQube ikut menganalisisnya dan
# memunculkan ratusan issue + duplikasi palsu yang menggagalkan Quality Gate.
sonar.exclusions=**/*.json,**/*.sarif
